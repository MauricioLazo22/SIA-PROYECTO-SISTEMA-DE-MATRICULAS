<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Contraseña - Universidad Leonesco</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('fondo.png') no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .recovery-panel {
      background: #fdf6f0;
      padding: 40px;
      width: 400px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .recovery-panel img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 20px;
      border: 3px solid #5a3e1b;
    }

    h2 {
      color: #5a3e1b;
      margin-bottom: 10px;
    }

    p {
      color: #333;
      font-size: 14px;
      margin-bottom: 20px;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #999;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .submit-btn {
      background-color: #f26c18;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #d95d10;
    }

    .back-link {
      display: block;
      margin-top: 15px;
      font-size: 13px;
      color: #555;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="recovery-panel">
      <img src="leonescologo.png" alt="Logo Universidad Leonesco">
      <h2>¿Olvidaste tu contraseña?</h2>
      <p>Ingresa tu correo institucional y te enviaremos un enlace para restablecerla.</p>
      <input type="email" placeholder="correo@leonesco.edu" required>
      <button class="submit-btn">Enviar enlace</button>
      <a class="back-link" href="pantallainicio.html">← Volver al inicio de sesión</a>
    </div>
  </div>

</body>
</html>
